<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:url("https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=1600&q=80") center/cover;
position:relative;
}

/* Dark cinematic overlay */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
backdrop-filter:blur(2px);
}

/* Floating Hearts */

.heart{
position:absolute;
color:#ff4d88;
font-size:20px;
animation:float 10s linear infinite;
opacity:.6;
}

@keyframes float{

0%{
transform:translateY(100vh) scale(.5);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-100px) scale(1.5);
opacity:0;
}

}

/* Card */

.container{

position:relative;
z-index:10;

width:700px;
padding:40px;

background:rgba(255,255,255,.12);

border-radius:25px;

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.2);

box-shadow:0 0 40px rgba(0,0,0,.4);

text-align:center;

animation:fade 2s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h1{

font-family:"Great Vibes",cursive;
font-size:65px;
color:#fff;
margin-bottom:10px;

text-shadow:0 0 20px #ff1493;

}

p{

color:#eee;
margin-bottom:30px;
font-size:18px;

}

button{

padding:15px 35px;
font-size:18px;

border:none;

border-radius:50px;

background:linear-gradient(45deg,#ff1493,#ff4d88);

color:white;

cursor:pointer;

transition:.4s;

box-shadow:0 0 20px hotpink;

}

button:hover{

transform:scale(1.1);

box-shadow:0 0 35px hotpink;

}

/* Upload */

.upload{

margin-top:30px;

}

input{

display:none;

}

label{

display:inline-block;

padding:12px 30px;

background:white;

border-radius:40px;

cursor:pointer;

font-weight:bold;

}

img{

margin-top:25px;

width:300px;

height:300px;

object-fit:cover;

border-radius:20px;

display:none;

box-shadow:0 0 30px pink;

animation:zoom 1s;

}

@keyframes zoom{

from{

transform:scale(.5);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}

</style>

</head>

<body>

<div class="container">

<h1>For My Love ❤️</h1>

<p>
Every moment with you feels like a beautiful movie.
This little website is dedicated to the most special person in my life.
</p>

<button onclick="window.location='login.html'">
Know More About Me
</button>

<div class="upload">

<br><br>

<label for="photo">
📸 Upload Our Memory
</label>

<input type="file" id="photo" accept="image/*">

<br>

<img id="preview">

</div>

</div>

<script>

// Floating Hearts

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=5+Math.random()*6+"s";

heart.style.fontSize=10+Math.random()*30+"px";

heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}

// Image Preview

document.getElementById("photo").addEventListener("change",function(e){

const file=e.target.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(){

const img=document.getElementById("preview");

img.src=reader.result;

img.style.display="block";

}

reader.readAsDataURL(file);

}

});

</script>

</body>
</html>
